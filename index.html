<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather</title>
    <link
      href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌤️</text></svg>"
    />
  </head>
  <body>
    <div id="bg-animation"></div>

    <!-- mobile only: weather info shown above card -->
    <div class="mobile-today">
      <h2 class="m-city"></h2>
      <h1 class="m-temp"></h1>
      <p class="m-feels"></p>
      <p class="m-condition"></p>
      <div class="m-details">
        <span class="m-humidity"></span>
        <span class="m-wind"></span>
      </div>
      <p class="m-tip"></p>
    </div>

    <div class="card">
      <div class="search">
        <input type="text" placeholder="Enter city name" spellcheck="false" />
        <p class="error"></p>
      </div>
      <div class="main">
        <!-- desktop: today's weather on left -->
        <div class="today">
          <h2 class="city"></h2>
          <h1 class="temp"></h1>
          <p class="feels"></p>
          <p class="condition"></p>
          <div class="details">
            <div class="col">
              <i class="bx bx-air"></i>
              <div>
                <p class="humidity"></p>
                <p>Humidity</p>
              </div>
            </div>
            <div class="col">
              <i class="bx bx-wind"></i>
              <div>
                <p class="wind"></p>
                <p>Wind</p>
              </div>
            </div>
          </div>
          <p class="tip"></p>
        </div>

        <!-- right: 5 day forecast -->
        <div class="forecast" id="forecast"></div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
