<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather</title>
    <link
      href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css"
      media="print"
      onload="this.media = 'all'"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌤️</text></svg>"
    />

    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#1a1a2e" />

    <link rel="preconnect" href="https://api.openweathermap.org" />
    <link rel="preconnect" href="https://cdn.boxicons.com" />
  </head>
  <body>
    <div id="bg-animation"></div>

    <!-- mobile only: weather info shown above card -->
    <div class="mobile-today">
      <h2 class="m-city"></h2>
      <h1 class="m-temp"></h1>
      <p class="m-feels"></p>
      <p class="m-condition"></p>
      <div class="m-details">
        <span class="m-humidity"></span>
        <span class="m-wind"></span>
      </div>
      <p class="m-tip"></p>
      <!-- hourly card sits between weather info and forecast card -->
      <div class="mobile-hourly-card" id="mobile-hourly-card">
        <div class="hourly-label">
          <i class="bx bx-time-five"></i> Next 24 hours
        </div>
        <div class="hourly-strip" id="mobile-hourly-strip"></div>
      </div>
    </div>

    <!-- main card + hourly panel -->
    <div class="card-stack">
      <div class="card">
        <div class="search">
          <input type="text" placeholder="Enter city name" spellcheck="false" />
          <p class="error"></p>
        </div>
        <div class="main">
          <!-- left: today -->
          <div class="today">
            <h2 class="city"></h2>
            <h1 class="temp"></h1>
            <p class="feels"></p>
            <p class="condition"></p>
            <div class="details">
              <div class="col">
                <i class="bx bx-air"></i>
                <div>
                  <p class="humidity"></p>
                  <p class="humidity-label">Humidity</p>
                  <p class="humidity-feel"></p>
                </div>
              </div>
              <div class="col">
                <i class="bx bx-wind"></i>
                <div>
                  <p class="wind"></p>
                  <p class="wind-label">Wind</p>
                  <p class="wind-feel"></p>
                </div>
              </div>
            </div>
            <p class="tip"></p>
          </div>
          <!-- right: 5 day forecast -->
          <div class="forecast" id="forecast"></div>
        </div>
      </div>
      <!-- hourly panel slides below on desktop -->
      <div class="hourly-panel" id="hourly-panel">
        <div class="hourly-label">
          <i class="bx bx-time-five"></i> Next 24 hours
        </div>
        <div class="hourly-strip" id="hourly-strip"></div>
      </div>
    </div>

    <!-- floating search — mobile only, fixed at bottom -->
    <div class="floating-search">
      <input
        type="text"
        placeholder="Enter a city"
        spellcheck="false"
        id="floating-search-input"
      />
      <p class="error" id="floating-error"></p>
    </div>

    <script src="app.js"></script>
  </body>
</html>
