<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather</title>
    <link
      href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="bg-animation"></div>
    <div class="card">
      <div class="search">
        <input type="text" placeholder="enter city name" spellcheck="false" />
      </div>
      <div class="main">
        <!-- left: today -->
        <div class="today">
          <h2 class="city"></h2>
          <h1 class="temp"></h1>
          <p class="condition"></p>
          <div class="details">
            <div class="col">
              <i class="bx bx-air"></i>
              <div>
                <p class="humidity"></p>
                <p>Humidity</p>
              </div>
            </div>
            <div class="col">
              <i class="bx bx-wind"></i>
              <div>
                <p class="wind"></p>
                <p>Wind</p>
              </div>
            </div>
          </div>
        </div>
        <!-- right: 5 day forecast -->
        <div class="forecast" id="forecast"></div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
